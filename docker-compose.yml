services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assetbalancer
      POSTGRES_USER: assetbalancer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetbalancer -d assetbalancer"]
      interval: 5s
      timeout: 5s
      retries: 10

  beff:
    build: ./BEFF
    environment:
      - PORT=3001
      - ALLOWED_ORIGIN=http://frontend
      - DATABASE_URL=postgresql://assetbalancer:${POSTGRES_PASSWORD}@db:5432/assetbalancer
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - beff
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:

networks:
  internal:
